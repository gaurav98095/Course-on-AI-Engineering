<!-- MathJax 3. All math in this site's markdown SOURCE is written with a DOUBLED
     backslash — \\(...\\) inline, \\[...\\] display — never $...$/$$...$$, and
     never a single \(/\[. Reason: kramdown treats parens/brackets as escapable
     punctuation and silently strips a lone backslash in front of them (e.g.
     "\(x\)" becomes "(x)" in the rendered HTML — no error, just broken math).
     Doubling the backslash makes kramdown's escape processor consume "\\" and
     emit one literal "\", so \(/\[ survive intact into the HTML MathJax sees.
     MathJax's TeX package recognizes \(\)/\[\] by default, no config needed.
     (We deliberately avoid $...$ as an inline delimiter too: this site's prose
     quotes real dollar amounts, e.g. "~$1/hr", and a $-delimiter would misfire.)
     The renderAction below is a harmless fallback in case kramdown ever emits
     its own <script type="math/tex"> tags — dead code under normal operation. -->
<script>
  window.MathJax = {
    options: {
      renderActions: {
        findScript: [10, function (doc) {
          for (const node of document.querySelectorAll('script[type^="math/tex"]')) {
            const display = !!node.type.match(/; *mode=display/);
            const math = new doc.options.MathItem(node.textContent, doc.inputJax[0], display);
            const text = document.createTextNode('');
            node.parentNode.replaceChild(text, node);
            math.start = { node: text, delim: '', n: 0 };
            math.end = { node: text, delim: '', n: 0 };
            doc.math.push(math);
          }
        }, '']
      }
    }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

<!-- Mermaid: renders ```mermaid code blocks as diagrams -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
  document.querySelectorAll('pre code.language-mermaid, div.language-mermaid pre code').forEach((el) => {
    const container = el.closest('div.language-mermaid') || el.closest('pre');
    const graph = document.createElement('pre');
    graph.className = 'mermaid';
    graph.textContent = el.textContent;
    container.replaceWith(graph);
  });
  mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
</script>
