<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .panel { fill:#F4F4F9; stroke:#E7E5DF; stroke-width:1.5; rx:14; }
    .bar   { fill:#4F46E5; }
    .bar2  { fill:#B45309; }
    .t     { font-size:14px; font-weight:700; fill:#1C2321; text-anchor:middle; }
    .s     { font-size:11px; fill:#5B6663; }
    .lbl   { font-size:11.5px; font-weight:600; fill:#1C2321; }
    .val   { font-size:11.5px; font-weight:700; fill:#FFFFFF; }
  </style>

  <rect class="panel" x="20" y="20" width="740" height="300"/>
  <text class="t" x="390" y="45">vLLM's own published throughput, vs baseline systems</text>
  <text class="s" x="390" y="62" text-anchor="middle">(vLLM project blog, 2023 — not this course's own measurement; see the honesty note in Lecture 14)</text>

  <text class="lbl" x="40" y="95">vs HuggingFace Transformers, single completion</text>
  <rect class="bar" x="40" y="102" width="576" height="22"/>
  <text class="val" x="600" y="118">14x – 24x</text>

  <text class="lbl" x="40" y="150">vs HuggingFace Transformers, parallel completions</text>
  <rect class="bar" x="40" y="157" width="384" height="22"/>
  <text class="val" x="408" y="173">8.5x – 15x</text>

  <text class="lbl" x="40" y="205">vs HuggingFace TGI, single completion</text>
  <rect class="bar2" x="40" y="212" width="120" height="22"/>
  <text class="val" x="144" y="228">2.2x – 2.5x</text>

  <text class="lbl" x="40" y="260">vs HuggingFace TGI, parallel completions</text>
  <rect class="bar2" x="40" y="267" width="160" height="22"/>
  <text class="val" x="184" y="283">3.3x – 3.5x</text>

  <text class="s" x="390" y="310" text-anchor="middle">Baseline waste vLLM's PagedAttention closes: 60–80% KV cache memory waste (Lecture 10) → under 4%.</text>
</svg>
