<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 340" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .lane  { fill:#F4F4F9; stroke:#E7E5DF; stroke-width:1.5; rx:14; }
    .tok   { fill:#EEF0FE; stroke:#4F46E5; stroke-width:1.3; rx:6; }
    .tokn  { fill:#4F46E5; }
    .t     { font-size:13px; font-weight:600; fill:#1C2321; text-anchor:middle; }
    .s     { font-size:11.5px; fill:#5B6663; text-anchor:middle; }
    .lbl   { font-size:11px; fill:#FFFFFF; text-anchor:middle; font-weight:600; }
    .arrow { stroke:#4F46E5; stroke-width:1.6; fill:none; marker-end:url(#arr); }
    .cache { fill:#FFFFFF; stroke:#9AA5A1; stroke-width:1.2; stroke-dasharray:3 3; rx:6; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
  </defs>

  <!-- PREFILL lane -->
  <rect class="lane" x="20" y="20" width="740" height="120"/>
  <text class="t" x="390" y="44">Prefill — one burst, all prompt tokens in parallel</text>

  <g>
    <rect class="tok tokn" x="60"  y="66" width="46" height="34"/>
    <rect class="tok tokn" x="114" y="66" width="46" height="34"/>
    <rect class="tok tokn" x="168" y="66" width="46" height="34"/>
    <rect class="tok tokn" x="222" y="66" width="46" height="34"/>
    <rect class="tok tokn" x="276" y="66" width="46" height="34"/>
  </g>
  <text class="lbl" x="83"  y="87">t1</text>
  <text class="lbl" x="137" y="87">t2</text>
  <text class="lbl" x="191" y="87">t3</text>
  <text class="lbl" x="245" y="87">t4</text>
  <text class="lbl" x="299" y="87">tN</text>
  <text class="s" x="191" y="118">all prompt tokens attend to each other in ONE forward pass</text>

  <path class="arrow" d="M340,83 L420,83"/>

  <rect class="cache" x="440" y="60" width="300" height="46"/>
  <text class="t" x="590" y="80">KV cache — written once</text>
  <text class="s" x="590" y="96">one K,V pair per token, per layer</text>

  <!-- DECODE lane -->
  <rect class="lane" x="20" y="160" width="740" height="165"/>
  <text class="t" x="390" y="184">Decode — a drip, one new token at a time</text>

  <rect class="cache" x="60" y="210" width="220" height="46"/>
  <text class="t" x="170" y="230">KV cache (growing)</text>
  <text class="s" x="170" y="246">t1 ... tN already stored</text>

  <path class="arrow" d="M280,233 L340,233"/>

  <rect class="tok" x="350" y="210" width="60" height="46"/>
  <text class="t" x="380" y="238">tN+1</text>

  <path class="arrow" d="M410,233 L470,233"/>

  <text class="s" x="545" y="228">one new</text>
  <text class="s" x="545" y="242">token out</text>

  <path class="arrow" d="M170,256 C170,285 380,290 380,256" stroke-dasharray="4 3"/>
  <text class="s" x="270" y="300">the new token's own K,V get appended — cache grows by one entry</text>

  <text class="s" x="390" y="318">Repeat once per output token. Each step reads the whole cache, but only computes ONE new row.</text>
</svg>
