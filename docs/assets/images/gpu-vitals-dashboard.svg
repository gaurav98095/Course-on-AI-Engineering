<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .lane  { fill:#F4F4F9; stroke:#E7E5DF; stroke-width:1.5; rx:12; }
    .line  { stroke:#4F46E5; stroke-width:2.2; fill:none; }
    .line2 { stroke:#B3261E; stroke-width:2.2; fill:none; }
    .grid  { stroke:#E7E5DF; stroke-width:1; }
    .t     { font-size:12.5px; font-weight:600; fill:#1C2321; }
    .s     { font-size:10.5px; fill:#5B6663; }
    .band  { fill:#EEF0FE; opacity:0.7; }
    .lblm  { font-size:10.5px; fill:#5B6663; text-anchor:middle; }
  </style>

  <text class="t" x="30" y="24" style="font-size:14px">GPU vitals, watched continuously — idle vs. answering a question</text>

  <!-- three stacked panels -->
  <!-- panel 1: utilization -->
  <rect class="lane" x="30" y="40" width="720" height="90"/>
  <text class="t" x="46" y="58">Utilization %</text>
  <rect class="band" x="330" y="50" width="140" height="72"/>
  <line class="grid" x1="90" y1="115" x2="740" y2="115"/>
  <polyline class="line" points="90,118 200,117 300,116 330,60 350,52 400,55 440,58 470,110 550,117 650,117 740,117"/>
  <text class="s" x="400" y="46" text-anchor="middle">generating</text>

  <!-- panel 2: memory -->
  <rect class="lane" x="30" y="140" width="720" height="90"/>
  <text class="t" x="46" y="158">Memory used (GiB)</text>
  <rect class="band" x="330" y="150" width="140" height="72"/>
  <polyline class="line" points="90,205 200,205 300,205 320,80 470,78 500,205 650,205 740,205" stroke="#7C87F0"/>
  <text class="s" x="90" y="220">idle: model resident (~16 GiB)</text>
  <text class="s" x="320" y="70" text-anchor="start">+cache, +activations</text>

  <!-- panel 3: power + temp -->
  <rect class="lane" x="30" y="240" width="720" height="120"/>
  <text class="t" x="46" y="258">Power (W) and Temperature (°C)</text>
  <rect class="band" x="330" y="250" width="140" height="100"/>
  <polyline class="line" points="90,330 200,328 300,326 330,200 400,180 440,190 470,300 550,328 650,328 740,328"/>
  <polyline class="line2" points="90,320 200,319 300,318 330,280 400,260 440,265 470,300 550,318 650,318 740,318"/>
  <text class="s" x="500" y="200" fill="#4F46E5">power</text>
  <text class="s" x="500" y="270" fill="#B3261E">temp</text>

  <text class="lblm" x="90" y="385">t=0s</text>
  <text class="lblm" x="400" y="385">t≈15s (one request)</text>
  <text class="lblm" x="740" y="385">t=30s</text>
</svg>
