<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 380" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .lane  { fill:#F4F4F9; stroke:#E7E5DF; stroke-width:1.5; rx:14; }
    .w     { stroke:#4F46E5; stroke-width:1.3; }
    .done  { fill:#7C87F0; }
    .todo  { fill:#EEF0FE; }
    .salient { fill:#B3261E; opacity:0.85; }
    .normal  { fill:#EEF0FE; }
    .t     { font-size:13px; font-weight:600; fill:#1C2321; }
    .s     { font-size:11px; fill:#5B6663; }
    .lbl   { font-size:10px; fill:#FFFFFF; text-anchor:middle; font-weight:600; }
    .arrow { stroke:#4F46E5; stroke-width:1.6; fill:none; marker-end:url(#arr); }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
  </defs>

  <!-- GPTQ lane -->
  <rect class="lane" x="20" y="20" width="740" height="150"/>
  <text class="t" x="40" y="46">GPTQ — quantize left to right, compensate as you go</text>

  <g>
    <rect class="w done" x="60"  y="70" width="70" height="40"/>
    <rect class="w done" x="140" y="70" width="70" height="40"/>
    <rect class="w todo" x="220" y="70" width="70" height="40" stroke-dasharray="3 3"/>
    <rect class="w todo" x="300" y="70" width="70" height="40" stroke-dasharray="3 3"/>
    <rect class="w todo" x="380" y="70" width="70" height="40" stroke-dasharray="3 3"/>
  </g>
  <text class="lbl" x="95"  y="94">w1 ✓</text>
  <text class="lbl" x="175" y="94">w2 ✓</text>
  <text class="lbl" x="255" y="94" fill="#5B6663">w3</text>
  <text class="lbl" x="335" y="94" fill="#5B6663">w4</text>
  <text class="lbl" x="415" y="94" fill="#5B6663">w5</text>

  <path class="arrow" d="M175,120 C175,140 255,140 255,122"/>
  <text class="s" x="480" y="90">1. quantize w1, w2 (round to grid)</text>
  <text class="s" x="480" y="105">2. push their rounding error into</text>
  <text class="s" x="480" y="120">   w3, w4, w5 (not-yet-quantized)</text>
  <text class="s" x="480" y="135">3. repeat — every later weight</text>
  <text class="s" x="480" y="150">   compensates for earlier ones</text>

  <!-- AWQ lane -->
  <rect class="lane" x="20" y="190" width="740" height="170"/>
  <text class="t" x="40" y="216">AWQ — find the salient channels first, protect them with a scale</text>

  <g>
    <rect class="w normal" x="60"  y="240" width="60" height="40"/>
    <rect class="w salient" x="130" y="240" width="60" height="40"/>
    <rect class="w normal" x="200" y="240" width="60" height="40"/>
    <rect class="w normal" x="270" y="240" width="60" height="40"/>
    <rect class="w salient" x="340" y="240" width="60" height="40"/>
    <rect class="w normal" x="410" y="240" width="60" height="40"/>
  </g>
  <text class="lbl" x="90"  y="264" fill="#1C2321">ch1</text>
  <text class="lbl" x="160" y="264">ch2</text>
  <text class="lbl" x="230" y="264" fill="#1C2321">ch3</text>
  <text class="lbl" x="300" y="264" fill="#1C2321">ch4</text>
  <text class="lbl" x="370" y="264">ch5</text>
  <text class="lbl" x="440" y="264" fill="#1C2321">ch6</text>

  <text class="s" x="500" y="255">salient channel (large activations) — scaled</text>
  <text class="s" x="500" y="270">up before quantizing, scaled back down after</text>

  <text class="s" x="60" y="305">Found by: run the calibration data through the layer once, measure each</text>
  <text class="s" x="60" y="320">channel's activation magnitude, protect the outliers — no per-weight</text>
  <text class="s" x="60" y="335">compensation, no re-running the whole layer.</text>
</svg>
