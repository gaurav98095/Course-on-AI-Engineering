<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 430" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .panel  { fill:#F4F4F9; stroke:#E7E5DF; stroke-width:1.5; rx:14; }
    .t      { font-size:14px; font-weight:700; fill:#1C2321; text-anchor:middle; }
    .s      { font-size:11px; fill:#5B6663; text-anchor:middle; }
    .w      { font-size:10.5px; font-weight:600; fill:#4F46E5; text-anchor:middle; }
    .vecA   { stroke:#4F46E5; stroke-width:2.2; }
    .vecB   { stroke:#B45309; stroke-width:2.2; }
    .arc    { stroke:#B9C0BD; stroke-width:1; fill:none; stroke-dasharray:2,2; }
  </style>

  <!-- RoPE panel -->
  <rect class="panel" x="20" y="20" width="360" height="190"/>
  <text class="t" x="200" y="42">RoPE — rotate the vectors</text>
  <circle cx="200" cy="120" r="60" fill="none" stroke="#E7E5DF" stroke-width="1"/>
  <line class="vecA" x1="200" y1="120" x2="255" y2="90"/>
  <text class="s" x="270" y="85">key, position n</text>
  <line class="vecB" x1="200" y1="120" x2="235" y2="170"/>
  <text class="s" x="255" y="180">query, position m</text>
  <path class="arc" d="M 235 95 A 40 40 0 0 1 225 155"/>
  <text class="w" x="200" y="185">angle between them depends only on (m - n)</text>
  <text class="s" x="200" y="200">no bias term added anywhere — geometry does the work</text>

  <!-- ALiBi panel -->
  <rect class="panel" x="400" y="20" width="360" height="190"/>
  <text class="t" x="580" y="42">ALiBi — penalize the score directly</text>
  <line x1="440" y1="140" x2="740" y2="140" stroke="#E7E5DF" stroke-width="1"/>
  <circle cx="580" cy="140" r="4" fill="#4F46E5"/>
  <text class="s" x="580" y="160">query, here</text>
  <circle cx="620" cy="140" r="3" fill="#B45309"/>
  <text class="s" x="620" y="120" font-size="10">-slope × 2</text>
  <circle cx="680" cy="140" r="3" fill="#B45309"/>
  <text class="s" x="680" y="120" font-size="10">-slope × 8</text>
  <circle cx="720" cy="140" r="3" fill="#B45309"/>
  <text class="s" x="720" y="165" font-size="10">-slope × 12</text>
  <text class="w" x="580" y="185">score -= slope × |i - j|, added right before softmax</text>
  <text class="s" x="580" y="200">farther keys get penalized more — no rotation involved</text>

  <!-- Frequency spectrum panel -->
  <rect class="panel" x="20" y="230" width="740" height="180"/>
  <text class="t" x="390" y="252">Why extrapolation risk isn't uniform across RoPE's dimensions</text>

  <text class="s" x="120" y="280">fast-rotating pairs (i≈0)</text>
  <path d="M 60 300 Q 75 285 90 300 T 120 300 T 150 300 T 180 300 T 210 300 T 240 300 T 270 300 T 300 300" fill="none" stroke="#4F46E5" stroke-width="1.5"/>
  <text class="s" x="180" y="325">many full rotations over the whole context —</text>
  <text class="s" x="180" y="340">always locally periodic, safe to extrapolate</text>

  <text class="s" x="620" y="280">slow-rotating pairs (i≈head_dim/2)</text>
  <path d="M 480 300 Q 570 270 660 300" fill="none" stroke="#B45309" stroke-width="1.5"/>
  <text class="s" x="570" y="325">barely turns at all over the whole context —</text>
  <text class="s" x="570" y="340">every position past training is a genuinely new angle</text>

  <text class="s" x="390" y="375">YaRN's fix: rescale the slow (long-range) pairs back toward the trained range, leave the fast (local) pairs untouched.</text>
  <text class="s" x="390" y="392">Same rotation idea as RoPE — a smarter choice of which frequencies get stretched.</text>
</svg>
