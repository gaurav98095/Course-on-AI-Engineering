<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .lane  { fill:#F4F4F9; stroke:#E7E5DF; stroke-width:1.5; rx:12; }
    .seg   { stroke:#4F46E5; stroke-width:1.3; }
    .retr  { fill:#9AA5A1; }
    .pre   { fill:#4F46E5; }
    .dec   { fill:#7C87F0; }
    .t     { font-size:13px; font-weight:600; fill:#1C2321; text-anchor:middle; }
    .s     { font-size:11px; fill:#5B6663; }
    .lbl   { font-size:10.5px; fill:#FFFFFF; text-anchor:middle; font-weight:600; }
    .axisl { font-size:11px; fill:#5B6663; text-anchor:middle; }
    .tick  { stroke:#E7E5DF; stroke-width:1; }
  </style>

  <text class="t" x="390" y="28">One request, named — a torch.profiler / nsys timeline</text>

  <!-- time axis -->
  <line class="tick" x1="60" y1="60" x2="60" y2="240"/>
  <line class="tick" x1="200" y1="60" x2="200" y2="240"/>
  <line class="tick" x1="340" y1="60" x2="340" y2="240"/>
  <line class="tick" x1="480" y1="60" x2="480" y2="240"/>
  <line class="tick" x1="620" y1="60" x2="620" y2="240"/>
  <line class="tick" x1="740" y1="60" x2="740" y2="240"/>
  <text class="axisl" x="60"  y="255">0ms</text>
  <text class="axisl" x="200" y="255">200ms</text>
  <text class="axisl" x="340" y="255">400ms</text>
  <text class="axisl" x="480" y="255">600ms</text>
  <text class="axisl" x="620" y="255">800ms</text>
  <text class="axisl" x="740" y="255">~1000ms</text>

  <!-- retrieval: tiny sliver -->
  <rect class="seg retr" x="60" y="80" width="5" height="34"/>
  <text class="lbl" x="140" y="101" text-anchor="start" fill="#5B6663">retrieval — ~40ms (0.4% of the request)</text>

  <!-- prefill: compute-bound burst -->
  <rect class="seg pre" x="65" y="130" width="150" height="34"/>
  <text class="lbl" x="140" y="151">prefill — ~1000ms</text>
  <text class="s" x="65" y="180">compute-bound: aten::matmul dominates</text>

  <!-- decode: many small ticks -->
  <g class="dec">
    <rect class="seg dec" x="220" y="130" width="16" height="34"/>
    <rect class="seg dec" x="240" y="130" width="16" height="34"/>
    <rect class="seg dec" x="260" y="130" width="16" height="34"/>
    <rect class="seg dec" x="280" y="130" width="16" height="34"/>
    <rect class="seg dec" x="300" y="130" width="16" height="34"/>
  </g>
  <text class="s" x="220" y="180">decode — one ~30ms step per token, repeated</text>
  <text class="s" x="220" y="195">memory-bound: same op, over and over</text>

  <rect class="lane" x="40" y="60" width="700" height="180" fill="none" stroke="#1C2321" stroke-width="1.2" rx="12"/>

  <text class="s" x="390" y="290" text-anchor="middle" style="font-style:italic">A profiler doesn't guess this shape — it names every millisecond and proves it.</text>
</svg>
