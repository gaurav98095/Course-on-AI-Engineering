<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" font-family="'Space Grotesk','Segoe UI',Helvetica,Arial,sans-serif">
  <style>
    .chip  { fill:#F4F4F9; stroke:#E7E5DF; stroke-width:1.5; rx:16; }
    .hbm   { fill:#EEF0FE; stroke:#4F46E5; stroke-width:1.5; rx:10; }
    .l2    { fill:#FFFFFF; stroke:#4F46E5; stroke-width:1.5; rx:10; }
    .sm    { fill:#FFFFFF; stroke:#4F46E5; stroke-width:1.2; rx:6; }
    .reg   { fill:#EEF0FE; stroke:#4F46E5; stroke-width:1; rx:4; }
    .t     { font-size:13px; font-weight:600; fill:#1C2321; text-anchor:middle; }
    .s     { font-size:11px; fill:#5B6663; text-anchor:middle; }
    .w     { font-size:11.5px; font-weight:600; fill:#4F46E5; text-anchor:middle; }
    .arrow { stroke:#4F46E5; stroke-width:1.6; fill:none; marker-end:url(#arr); }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
  </defs>

  <rect class="chip" x="20" y="20" width="740" height="360"/>
  <text class="t" x="390" y="46">One GPU</text>

  <!-- HBM -->
  <rect class="hbm" x="50" y="70" width="680" height="50"/>
  <text class="t" x="390" y="92">HBM — 24 to 141 GB, off-chip</text>
  <text class="s" x="390" y="108">everything lives here: weights, KV cache, activations</text>

  <text class="w" x="390" y="140">↓ ~0.3–3.3 TB/s ↓ (the belt)</text>

  <!-- L2 -->
  <rect class="l2" x="230" y="152" width="320" height="42"/>
  <text class="t" x="390" y="172">L2 cache — tens of MB, on-chip, shared</text>
  <text class="s" x="390" y="187">small; recently-used bytes only</text>

  <text class="w" x="390" y="216">↓ fan-out to every SM ↓</text>

  <!-- SMs row -->
  <g>
    <rect class="sm" x="50"  y="228" width="150" height="120"/>
    <rect class="sm" x="215" y="228" width="150" height="120"/>
    <rect class="sm" x="380" y="228" width="150" height="120"/>
    <rect class="sm" x="545" y="228" width="150" height="120"/>
  </g>
  <text class="s" x="125" y="245">SM 1</text>
  <text class="s" x="290" y="245">SM 2</text>
  <text class="s" x="455" y="245">SM 3</text>
  <text class="s" x="620" y="245">...</text>

  <g>
    <rect class="reg" x="62"  y="258" width="126" height="24"/>
    <rect class="reg" x="227" y="258" width="126" height="24"/>
    <rect class="reg" x="392" y="258" width="126" height="24"/>
    <rect class="reg" x="557" y="258" width="126" height="24"/>
  </g>
  <text class="s" x="125" y="274">Tensor Cores</text>
  <text class="s" x="290" y="274">Tensor Cores</text>
  <text class="s" x="455" y="274">Tensor Cores</text>
  <text class="s" x="620" y="274">Tensor Cores</text>

  <g>
    <rect class="reg" x="62"  y="292" width="126" height="24"/>
    <rect class="reg" x="227" y="292" width="126" height="24"/>
    <rect class="reg" x="392" y="292" width="126" height="24"/>
    <rect class="reg" x="557" y="292" width="126" height="24"/>
  </g>
  <text class="s" x="125" y="308">Registers + shared mem</text>
  <text class="s" x="290" y="308">Registers + shared mem</text>
  <text class="s" x="455" y="308">Registers + shared mem</text>
  <text class="s" x="620" y="308">Registers + shared mem</text>

  <text class="s" x="390" y="330">tens of thousands of ALUs</text>
  <text class="s" x="390" y="345">(the chefs — never the bottleneck at batch 1)</text>

  <text class="s" x="390" y="368">Dozens to ~130 SMs per GPU, all fed from the same HBM belt.</text>
</svg>
